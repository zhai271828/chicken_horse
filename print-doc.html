<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏分析文档 - 打印版</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @media print {
      body { margin: 0; }
      .no-print { display: none; }
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "SimHei", "WenQuanYi Micro Hei", sans-serif;
      line-height: 1.8;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      color: #333;
      font-size: 14px;
    }

    h1 {
      font-size: 24px;
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
      margin-top: 30px;
    }

    h2 {
      font-size: 20px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 8px;
      margin-top: 25px;
    }

    h3 {
      font-size: 16px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }

    th {
      background-color: #f5f5f5;
      font-weight: bold;
    }

    tr:nth-child(even) {
      background-color: #fafafa;
    }

    code {
      background-color: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 13px;
    }

    pre {
      background-color: #f4f4f4;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      font-size: 12px;
    }

    pre code {
      background: none;
      padding: 0;
    }

    hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 30px 0;
    }

    .toolbar {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
    }

    .toolbar button {
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-family: inherit;
    }

    .toolbar button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="toolbar no-print">
    <button onclick="window.print()">打印 / 保存为 PDF</button>
  </div>
  <div id="content"></div>

  <script>
    // 读取并渲染 markdown 文件
    fetch('游戏分析文档.md')
      .then(response => {
        if (!response.ok) throw new Error('无法读取文件');
        return response.text();
      })
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<p style="color:red">加载失败：' + err.message + '</p>' +
          '<p>请确保此 HTML 文件与 .md 文件在同一目录，且通过本地服务器访问（不能直接双击打开）。</p>' +
          '<p>启动方式：在该目录运行 <code>npx serve .</code> 或 <code>python -m http.server</code></p>';
      });
  </script>
</body>
</html>
